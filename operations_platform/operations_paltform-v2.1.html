<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营看板 - 数据分析与标注</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        /* 完整样式代码 - 保持主体一致，仅针对性修改 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, #1a3a8f 0%, #2a5bc7 100%);
            color: white;
            padding: 25px 0;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 6px 20px rgba(26, 59, 135, 0.15);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        
        h1 i {
            margin-right: 15px;
            font-size: 32px;
        }
        
        .dashboard-info {
            display: flex;
            gap: 30px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-value {
            font-size: 20px;
            font-weight: 600;
        }
        
        .info-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .tabs-container {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        
        .tabs-header {
            display: flex;
            background-color: #f8f9fa;
            border-bottom: 1px solid #eaeaea;
        }
        
        .tab-btn {
            padding: 18px 40px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tab-btn i {
            font-size: 18px;
        }
        
        .tab-btn:hover {
            color: #1a73e8;
            background-color: rgba(26, 115, 232, 0.05);
        }
        
        .tab-btn.active {
            color: #1a73e8;
            background-color: white;
            font-weight: 600;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #1a73e8;
        }
        
        .tab-content {
            min-height: 600px;
        }
        
        .tab-pane {
            display: none;
            padding: 30px;
        }
        
        .tab-pane.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .data-analysis-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        
        .analysis-section {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef0f4;
        }
        
        .batch-time-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .batch-time-selector label {
            font-weight: 600;
            color: #444;
            font-size: 16px;
        }
        
        .batch-time-selector select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            background-color: white;
            width: 200px;
            transition: all 0.3s;
        }
        
        .stats-text {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #1a73e8;
            font-size: 16px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-label {
            font-weight: 600;
            color: #666;
        }
        
        .stat-value {
            font-weight: 700;
            color: #333;
        }
        
        .stat-value.default-count {
            color: #e67e22;
        }
        
        .stat-value.pending {
            color: #f39c12;
            font-style: italic;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .chart-container, .metrics-container {
            background-color: #f9fafc;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef0f4;
            height: 320px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
            text-align: center;
        }
        
        .chart-description {
            font-size: 13px;
            color: #777;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .metrics-container .circle-metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            height: calc(100% - 40px);
            padding: 5px 15px;
            align-items: center;
            justify-items: center;
            margin-top: 10px;
        }
        
        .metric-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            padding: 8px 5px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            border: 1px solid transparent;
            height: 60px;
            width: 100px;
            margin: 0 auto;
        }
        
        .metric-box.highlight {
            background: linear-gradient(135deg, #1a73e8 0%, #6c8ef5 100%);
            border-color: #1a73e8;
        }
        
        .metric-box.success {
            background: linear-gradient(135deg, #34a853 0%, #5bd66f 100%);
            border-color: #34a853;
        }
        
        .metric-box.warning {
            background: linear-gradient(135deg, #fbbc05 0%, #ffd04a 100%);
            border-color: #fbbc05;
        }
        
        .metric-box.danger {
            background: linear-gradient(135deg, #ea4335 0%, #ff6b6b 100%);
            border-color: #ea4335;
        }
        
        .metric-box.pending {
            background: linear-gradient(135deg, #95a5a6 0%, #bdc3c7 100%);
            border-color: #95a5a6;
        }
        
        .metric-box-value {
            font-size: 14px;
            font-weight: 700;
            color: white;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        
        .metric-box-label {
            font-size: 10px;
            color: white;
            font-weight: 600;
            text-align: center;
            line-height: 1.1;
        }
        
        .filters-container {
            background-color: #f9fafc;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #eef0f4;
        }
        
        .filters-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filters-title i {
            color: #1a73e8;
        }
        
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 15px;
        }
        
        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background-color: white;
            transition: all 0.3s;
        }
        
        .filter-actions {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eef0f4;
            display: flex;
            gap: 15px;
        }
        
        .btn-reset, .btn-filter, .btn-batch-annotation {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-reset {
            background-color: #f8f9fa;
            color: #666;
            border: 1px solid #ddd;
        }
        
        .btn-filter {
            background: linear-gradient(135deg, #34a853 0%, #5bd66f 100%);
            color: white;
        }
        
        .btn-batch-annotation {
            background: linear-gradient(135deg, #1a73e8 0%, #6c8ef5 100%);
            color: white;
        }
        
        .table-container {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef0f4;
        }
        
        .table-title {
            font-size: 18px;
            padding: 20px;
            margin: 0;
            color: #444;
            background-color: #f8f9fa;
            border-bottom: 1px solid #eef0f4;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 添加固定布局，更好控制列宽 */
        }
        
        .data-table th {
            background-color: #f5f7fa;
            padding: 15px 8px; /* 统一水平内边距，保证列间距相同 */
            text-align: left;
            font-weight: 600;
            color: #444;
            border-bottom: 2px solid #eef0f4;
            width: 16.666%; /* 6列均分 */
        }
        
        .data-table td {
            padding: 15px 8px; /* 列间距均匀的关键：统一设置水平内边距，不设特殊宽度 */
            border-bottom: 1px solid #eef0f4;
            vertical-align: middle;
            word-wrap: break-word;
        }
        
        .data-table tr:hover {
            background-color: #f9fafc;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            min-width: 80px;
        }
        
        .status-risky {
            background-color: #fef3e9;
            color: #e67e22;
            border: 1px solid #fad7a0;
        }
        
        .status-safe {
            background-color: #e9f7ef;
            color: #27ae60;
            border: 1px solid #a3e4c1;
        }
        
        .status-pending {
            background-color: #fef9e7;
            color: #f39c12;
            border: 1px solid #f8c471;
        }
        
        .status-na {
            background-color: #f8f9fa;
            color: #95a5a6;
            border: 1px solid #d5dbdb;
        }
        
        .status-tobegenerated {
            background-color: #f5f7fa;
            color: #7f8c8d;
            border: 1px solid #d5dbdb;
            font-style: italic;
        }
        
        .annotation-select {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            width: 100px;
            background-color: white;
        }
        
        /* 详情链接样式：强制设置为蓝色，可点击（除非特殊情况） */
        .detail-link {
            color: #1a73e8 !important;  /* 强制蓝色 */
            text-decoration: none;
            font-size: 12px;
            margin-left: 5px;
            cursor: pointer;
        }
        
        .detail-link.disabled-link {
            color: #aaa !important;
            pointer-events: none;
            cursor: default;
        }
        
        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        .pagination-btn {
            padding: 8px 15px;
            background-color: #f5f7fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-info {
            font-size: 14px;
            color: #666;
        }
        
        /* 运营指标概览页面样式 */
        .metrics-overview-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        
        .metrics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eef0f4;
        }
        
        .metrics-header h3 {
            font-size: 20px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .time-range-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .time-range-selector select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background-color: white;
        }
        
        .charts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 30px;
        }
        
        .chart-wrapper {
            background-color: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef0f4;
            display: flex;
            flex-direction: column;
        }
        
        .chart-wrapper .chart-container {
            flex: 1;
            position: relative;
            min-height: 300px;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
        }
        
        /* 标注对话框样式 */
        .annotation-dialog {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .annotation-dialog.active {
            display: flex;
        }
        
        .annotation-dialog-content {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        
        .annotation-dialog-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .annotation-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
        }
        
        .annotation-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border: 2px solid #eef0f4;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .annotation-option.selected {
            border-color: #1a73e8;
            background-color: #f0f7ff;
        }
        
        .annotation-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .annotation-option.selected .annotation-checkbox {
            background-color: #1a73e8;
            border-color: #1a73e8;
        }
        
        .annotation-checkbox i {
            color: white;
            font-size: 12px;
            display: none;
        }
        
        .annotation-option.selected .annotation-checkbox i {
            display: block;
        }
        
        .annotation-dialog-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: flex-end;
        }
        
        .btn-cancel, .btn-confirm {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-cancel {
            background-color: #f8f9fa;
            color: #666;
            border: 1px solid #ddd;
        }
        
        .btn-confirm {
            background: linear-gradient(135deg, #1a73e8 0%, #6c8ef5 100%);
            color: white;
        }
        
        .btn-confirm:disabled {
            background: linear-gradient(135deg, #95a5a6 0%, #bdc3c7 100%);
            cursor: not-allowed;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 14px;
            margin-top: 40px;
        }

        /* 详情弹窗样式 - 修改：关闭按钮始终右上角，去除客户编码显示 */
        .detail-dialog {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .detail-dialog.active {
            display: flex;
        }
        .detail-dialog-content {
            background-color: white;
            border-radius: 16px;
            padding: 30px 35px;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative; /* 为绝对定位关闭按钮提供参考 */
        }
        .detail-dialog-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a73e8;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eef0f4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* 关闭按钮绝对定位在右上角 */
        .close-detail-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            z-index: 2100;
        }
        .close-detail-btn:hover { color: #333; }
        
        .detail-section {
            margin-bottom: 25px;
        }
        .detail-section h4 {
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
            border-left: 5px solid #1a73e8;
            padding-left: 12px;
            background-color: #f5f9ff;
            line-height: 1.4;
        }
        .detail-section p {
            font-size: 15px;
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #f9fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eef0f4;
            margin-top: 0; /* 移除上边距，确保无空行 */
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div style="display: flex; align-items: center;">
                    <a href="../overview/overview_code.html" style="color: white; margin-right: 20px; text-decoration: none; display: flex; align-items: center; opacity: 0.9;" title="返回总览">
                        <i class="fas fa-arrow-left" style="font-size: 24px;"></i>
                    </a>
                    <h1><i class="fas fa-chart-line"></i> 运营看板</h1>
                </div>

            </div>
        </header>
        
        <main>
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="data-analysis">
                        <i class="fas fa-chart-bar"></i> 运营数据分析
                    </button>
                    <button class="tab-btn" data-tab="metrics-overview">
                        <i class="fas fa-tachometer-alt"></i> 运营指标概览
                    </button>
                </div>
                
                <div class="tab-content">
                    <!-- 运营数据分析页面 -->
                    <div id="data-analysis" class="tab-pane active">
                        <div class="data-analysis-content">
                            <!-- 跑批时间选择 -->
                            <div class="batch-time-selector">
                                <label for="batch-time-select">跑批时间：</label>
                                <select id="batch-time-select">
                                    <option value="2025-11-5" selected>2025-11-5</option>
                                    <option value="2026-2-5">2026-2-5</option>
                                </select>
                            </div>
                            
                            <!-- 统计数据 -->
                            <div class="stats-text" id="stats-container">
                                <!-- 动态更新 -->
                            </div>
                            
                            <!-- 预测结果分布图表 -->
                            <div class="charts-grid">
                                <div class="chart-container">
                                    <div class="chart-title">预测结果分布</div>
                                    <div class="chart-description" id="prediction-description"></div>
                                    <canvas id="predictionChart"></canvas>
                                </div>
                                <div class="metrics-container">
                                    <div class="chart-title">运营指标</div>
                                    <div class="chart-description">关键运营指标概览</div>
                                    <div class="circle-metrics-grid" id="metrics-grid">
                                        <!-- 动态更新 -->
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 筛选器 -->
                            <div class="filters-container">
                                <div class="filters-title">
                                    <i class="fas fa-filter"></i> 数据筛选选项
                                </div>
                                <div class="filters-grid">
                                    <div class="filter-group">
                                        <label for="model-prediction">大模型预测</label>
                                        <select id="model-prediction">
                                            <option value="all">全部</option>
                                            <option value="risky">有风险</option>
                                            <option value="safe">无风险</option>
                                        </select>

        function applyBatchAnnotation() {

        // ==================== 运营指标概览图表 ====================

        function generateDateLabels(timeRange, rightBoundDate) {
            const rightDate = new Date(rightBoundDate);
            const leftDate = new Date(rightDate);
            switch(timeRange) {
                case '1month': leftDate.setMonth(rightDate.getMonth() - 1); break;
                case '3months': leftDate.setMonth(rightDate.getMonth() - 3); break;
                case '6months': leftDate.setMonth(rightDate.getMonth() - 6); break;
                case '1year': leftDate.setFullYear(rightDate.getFullYear() - 1); break;
                default: leftDate.setMonth(rightDate.getMonth() - 3);
            }
            const totalDays = Math.floor((rightDate - leftDate) / (1000 * 60 * 60 * 24));
            let dataPoints = totalDays <= 30 ? 7 : totalDays <= 90 ? 9 : totalDays <= 180 ? 11 : 13;
            const labels = [];
            for (let i = 0; i < dataPoints; i++) {
                const date = new Date(leftDate);
                if (i === 0) {} else if (i === dataPoints - 1) { date.setTime(rightDate.getTime()); }
                else { date.setDate(leftDate.getDate() + Math.floor((totalDays * i) / (dataPoints - 1))); }
                labels.push(`${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')}`);
            }
            return labels;
        }

        function generateRandomData(min, max, count, isPercent = true) {
            const data = [];
            for (let i = 0; i < count; i++) {
                let value = isPercent ? (Math.random() * (max - min) + min) / 100 : Math.floor(Math.random() * (max - min + 1)) + min;
                data.push(value);
            }
            return data;
        }

        function initializeMetricsCharts() {
            const today = new Date();
            const rightBoundDate1 = new Date(today.setDate(today.getDate() - 21));
            const rightBoundDate2 = new Date(today.setMonth(today.getMonth() - 3));
            const timeRange = document.getElementById('time-range').value;
            
            // 风险查准率
            if (document.getElementById('riskAccuracyChart')) {
                const labels = generateDateLabels(timeRange, rightBoundDate1);
                const ctx = document.getElementById('riskAccuracyChart').getContext('2d');
                riskAccuracyChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: '风险查准率', data: generateRandomData(35, 40, labels.length, true), borderColor: '#1a73e8', backgroundColor: 'rgba(26,115,232,0.1)', borderWidth: 2, tension: 0, pointRadius: 3 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false, min: 0.30, max: 0.45, ticks: { callback: v => (v * 100).toFixed(0) + '%' } } } }
                });
            }
            // 违约准召率
            if (document.getElementById('defaultAccuracyRecallChart')) {
                const labels = generateDateLabels(timeRange, rightBoundDate2);
                const ctx = document.getElementById('defaultAccuracyRecallChart').getContext('2d');
                defaultAccuracyRecallChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [
                        { label: '违约查准率', data: generateRandomData(20, 25, labels.length, true), borderColor: '#34a853', backgroundColor: 'rgba(52,168,83,0.1)', borderWidth: 2, tension: 0, pointRadius: 3 },
                        { label: '违约查全率', data: generateRandomData(58, 80, labels.length, true), borderColor: '#ea4335', backgroundColor: 'rgba(234,67,53,0.1)', borderWidth: 2, tension: 0, pointRadius: 3 }
                    ] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false, min: 0.10, max: 0.85, ticks: { callback: v => (v * 100).toFixed(0) + '%' } } } }
                });
            }
            // 反馈无风险违约率
            if (document.getElementById('riskFreeDefaultRateChart')) {
                const labels = generateDateLabels(timeRange, rightBoundDate2);
                const ctx = document.getElementById('riskFreeDefaultRateChart').getContext('2d');
                riskFreeDefaultRateChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: '反馈无风险违约率', data: generateRandomData(0.15, 0.25, labels.length, true), borderColor: '#fbbc05', backgroundColor: 'rgba(251,188,5,0.1)', borderWidth: 2, tension: 0, pointRadius: 3 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false, min: 0.001, max: 0.003, ticks: { callback: v => (v * 100).toFixed(2) + '%' } } } }
                });
            }
            // 风险贷款余额 —— 使用 RANDBETWEEN(6,9) 单位亿美元，范围6~9，纵坐标单位为"亿美元"
            if (document.getElementById('riskLoanBalanceChart')) {
                const labels = generateDateLabels(timeRange, rightBoundDate2);
                const ctx = document.getElementById('riskLoanBalanceChart').getContext('2d');
                // 生成6-9之间的随机整数，单位亿美元
                const data = [];
                for (let i = 0; i < labels.length; i++) {
                    data.push(Math.floor(Math.random() * (9 - 6 + 1)) + 6); // 6~9 亿美元
                }
                riskLoanBalanceChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: '风险贷款余额', data: data, borderColor: '#8e44ad', backgroundColor: 'rgba(142,68,173,0.1)', borderWidth: 2, tension: 0, pointRadius: 3 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false, min: 5, max: 10, ticks: { callback: v => v + '亿美元' } } } } // 单位从'亿元'改为'亿美元'
                });
            }
            metricsChartsInitialized = true;
        }

        function updateMetricsChartsByTimeRange(timeRange) {
            const today = new Date();
            const rightBoundDate1 = new Date(today.setDate(today.getDate() - 21));
            const rightBoundDate2 = new Date(today.setMonth(today.getMonth() - 3));
            if (riskAccuracyChart) { const labels = generateDateLabels(timeRange, rightBoundDate1); riskAccuracyChart.data.labels = labels; riskAccuracyChart.data.datasets[0].data = generateRandomData(35,40,labels.length,true); riskAccuracyChart.update(); }
            if (defaultAccuracyRecallChart) { const labels = generateDateLabels(timeRange, rightBoundDate2); defaultAccuracyRecallChart.data.labels = labels; defaultAccuracyRecallChart.data.datasets[0].data = generateRandomData(20,25,labels.length,true); defaultAccuracyRecallChart.data.datasets[1].data = generateRandomData(58,80,labels.length,true); defaultAccuracyRecallChart.update(); }
            if (riskFreeDefaultRateChart) { const labels = generateDateLabels(timeRange, rightBoundDate2); riskFreeDefaultRateChart.data.labels = labels; riskFreeDefaultRateChart.data.datasets[0].data = generateRandomData(0.15,0.25,labels.length,true); riskFreeDefaultRateChart.update(); }
            if (riskLoanBalanceChart) {
                const labels = generateDateLabels(timeRange, rightBoundDate2);
                riskLoanBalanceChart.data.labels = labels;
                const data = [];
                for (let i = 0; i < labels.length; i++) data.push(Math.floor(Math.random() * (9 - 6 + 1)) + 6);
                riskLoanBalanceChart.data.datasets[0].data = data;
                riskLoanBalanceChart.update();
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        }

            updateTable(1);
            updateTime();
            document.getElementById('batch-time-select').addEventListener('change', function() { updateStats(this.value); allDataCache = null; updateTable(1); });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(tabId).classList.add('active');
                    if (tabId === 'metrics-overview' && !metricsChartsInitialized) { setTimeout(() => { initializeMetricsCharts(); }, 100); }
                });
            });
            document.getElementById('time-range').addEventListener('change', function() { if (metricsChartsInitialized) updateMetricsChartsByTimeRange(this.value); });
            window.addEventListener('resize', function() { if (predictionChart) predictionChart.resize(); if (riskAccuracyChart) riskAccuracyChart.resize(); if (defaultAccuracyRecallChart) defaultAccuracyRecallChart.resize(); if (riskFreeDefaultRateChart) riskFreeDefaultRateChart.resize(); if (riskLoanBalanceChart) riskLoanBalanceChart.resize(); });
            setInterval(updateTime, 60000);
        });
    </script>
